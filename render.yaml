services:
  - type: web
    name: lta-parametric-dashboard
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4 --worker-class gthread
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: RENDER
        value: "true"